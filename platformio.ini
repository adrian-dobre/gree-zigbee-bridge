[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = /Users/adriandobre/.platformio/packages/framework-arduinoespressif32/tools/partitions/zigbee.csv
build_flags =
	-DZIGBEE_MODE_ED
	; Feature flags (defaults live in include/Config.h):
	;   -DUSE_IR=0     ; disable IR transmission (default on)
	;   -DUSE_IFEEL=1  ; report room temperature to the AC (iFeel)
lib_deps =
	sensirion/Sensirion I2C SHT4x@^1.1.2

